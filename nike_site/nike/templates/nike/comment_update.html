<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Comment - Nike</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        .container {max-width:600px; margin:100px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        h2 {text-align:center; margin-bottom:20px;}
        textarea {width:100%; height:100px; margin-bottom:20px; padding:10px; font-size:16px; border-radius:5px; border:1px solid #ccc;}
        button {background:#111; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;}
        button:hover {background:#ff5500;}
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Comment</h2>
    <form method="post">
        {% csrf_token %}
        <text area name="content" required>{{ comment.content }}</textarea>
        <br>
        <button type="submit">Update</button>
    </form>
    <a href="{% url 'news_detail' comment.news.id %}">Cancel</a>
</div>

</body>
</html>

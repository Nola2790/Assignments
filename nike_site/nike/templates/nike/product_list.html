<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KickZone - Home</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        nav {
            background-color: #111;
            padding: 15px;
        }

        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #7e665a;
        }

        .hero {
            background-image: url('/static/nike/images.jpg');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-align: center;
        }

        .hero h1 {
            font-size: 50px;
            margin: 0;
        }

        .section-title {
            text-align: center;
            margin: 40px 0 20px;
            font-size: 30px;
            color: #111;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 0 20px 40px;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            width: 220px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px 0 5px;
            font-size: 18px;
        }

        .card p {
            margin: 0 0 10px;
            color: #555;
        }

        .card a {
            display: inline-block;
            margin-bottom: 10px;
            padding: 8px 15px;
            background-color: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .card a:hover {
            background-color: #917466;
        }

        footer {
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/categories/">Categories</a>
    <a href="/news/">News</a>
    <a href="/users/">Users</a>
    <a href="/orders/">Orders</a>
</nav>



<h2 class="section-title">Products</h2>
<div class="grid">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>${{ product.price }}</p>
        <a href="/products/{{ product.id }}/">View Details</a>
    </div>
    {% endfor %}
</div>

<footer>
    &copy; 2026 nike project
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - Nike</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        nav {background:#111; padding:15px;}
        nav a {color:#fff; margin:0 15px; text-decoration:none; font-weight:bold;}
        nav a:hover {color:#ff5500;}
        .container {max-width:900px; margin:40px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        img {width:100%; max-width:400px; display:block; margin:0 auto 20px;}
        h2 {text-align:center; margin-bottom:20px;}
        p {font-size:16px; margin:10px 0;}
        footer {background:#111; color:#fff; text-align:center; padding:15px; margin-top:40px;}
        a.button {display:inline-block; padding:10px 20px; background:#111; color:#fff; text-decoration:none; border-radius:5px; margin-top:15px;}
        a.button:hover {background:#ff5500;}
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/categories/">Categories</a>
    <a href="/news/">News</a>
    <a href="/users/">Users</a>
    <a href="/orders/">Orders</a>
</nav>

<div class="container">
    <img src="{{ product.image.url }}" alt="{{ product.name }}">
    <h2>{{ product.name }}</h2>
    <p><strong>Price:</strong> ${{ product.price }}</p>
    <p><strong>Description:</strong> {{ product.description }}</p>
    <p><strong>Stock:</strong> {{ product.stock }}</p>
    <a class="button" href="/products/">Back to Products</a>
</div>

<footer>
    &copy; 2026 Nike Project
</footer>

</body>
</html>

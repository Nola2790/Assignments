<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if news_item %}Edit News{% else %}Create News{% endif %} - Nike</title>
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'news_list' %}">Back to News List</a>
</nav>

<h2>{% if news_item %}Edit News{% else %}Create News{% endif %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="title">Title:</label>
    <input type="text" name="title" value="{{ news_item.title|default:'' }}" required>

    <label for="content">Content:</label>
    <textarea name="content" required>{{ news_item.content|default:'' }}</textarea>

    <label for="image">Image:</label>
    <input type="file" name="image">

    <button type="submit">{% if news_item %}Update{% else %}Create{% endif %}</button>
</form>

</body>
</html>

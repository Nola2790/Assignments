
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if order %}Edit Order{% else %}Create Order{% endif %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 600px;
            margin: auto;
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<h1>{% if order %}Edit Order{% else %}Create Order{% endif %}</h1>

<form method="POST" action="{% if order %}{% url 'order_update' order.id %}{% else %}{% url 'order_create' %}{% endif %}">
    {% csrf_token %}
    
    <label for="user">User:</label>
    <select name="user" id="user" required>
        {% for user in users %}
            <option value="{{ user.id }}" {% if order and order.user.id == user.id %}selected{% endif %}>
                {{ user.username }}
            </option>
        {% endfor %}
    </select>

    <label for="quantity">Quantity:</label>
    <input type="number" name="quantity" id="quantity" min="1" value="{% if order %}{{ order.quantity }}{% else %}1{% endif %}" required>

    <label for="status">Status:</label>
    <select name="status" id="status" required>
        <option value="Pending" {% if order and order.status == 'Pending' %}selected{% endif %}>Pending</option>
        <option value="Completed" {% if order and order.status == 'Completed' %}selected{% endif %}>Completed</option>
        <option value="Cancelled" {% if order and order.status == 'Cancelled' %}selected{% endif %}>Cancelled</option>
    </select>

    <button type="submit">{% if order %}Update Order{% else %}Create Order{% endif %}</button>
</form>

<a href="{% url 'order_list' %}">Back to Order List</a>

</body>
</html>

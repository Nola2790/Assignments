<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KickZone - Orders</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        nav {background:#111; padding:15px;}
        nav a {color:#fff; margin:0 15px; text-decoration:none; font-weight:bold;}
        nav a:hover {color:#ff5500;}
        h1 {text-align:center; margin:30px 0; color:#111;}
        table {width:90%; margin:0 auto 40px; border-collapse: collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        th, td {padding:12px; text-align:left; border-bottom:1px solid #ddd;}
        th {background:#111; color:#fff;}
        tr:hover {background:#f1f1f1;}
        footer {background:#111; color:#fff; text-align:center; padding:15px; margin-top:40px;}
    </style>
</head>
<body>

<h2>Order List</h2>
<table>
    <tr>
        <th>Order ID</th>
        <th>User</th>
        <th>Total Amount</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>
    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.user.username }}</td>
        <td>${{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
        <td>
            <a href="{% url 'order_detail' order.id %}">View</a> |
            <a href="{% url 'order_update' order.id %}">Edit</a> |
            <a href="{% url 'order_delete' order.id %}">Delete</a>
        </td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No orders found.</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>

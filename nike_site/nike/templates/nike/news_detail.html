<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ news_item.title }} - Nike</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }
        nav {
            background: #111;
            padding: 15px;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }
        nav a:hover {
            color: #ff5500;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
        img {
            width: 100%;
            max-height: 400px;
            object-fit: cover;
            display: block;
            margin-bottom: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            margin: 10px 0;
        }
        .comment-form {
            margin-top: 30px;
        }
        .comment-list {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        footer {
            background: #111;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
        a.button {
            display: inline-block;
            padding: 10px 20px;
            background: #111;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        a.button:hover {
            background: #ff5500;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/categories/">Categories</a>
    <a href="/news/">News</a>
    <a href="/users/">Users</a>
    <a href="/orders/">Orders</a>
    <a href="{% url 'news_list' %}">Back to News List</a>
</nav>

<h2>{{ news_item.title }}</h2>
<p>{{ news_item.content }}</p>
<img src="{{ news_item.image.url }}" alt="{{ news_item.title }}">

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ category.name }} - Nike</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        nav {background:#111; padding:15px;}
        nav a {color:#fff; margin:0 15px; text-decoration:none; font-weight:bold;}
        nav a:hover {color:#ff5500;}
        h1 {text-align:center; margin:30px 0; color:#111;}
        p.description {text-align:center; margin-bottom:40px; color:#555;}
        .grid {display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:0 20px 40px;}
        .card {background:#fff; border-radius:8px; width:220px; box-shadow:0 2px 8px rgba(0,0,0,0.2); text-align:center; transition:transform 0.3s;}
        .card:hover {transform:translateY(-5px);}
        .card img {width:100%; height:180px; object-fit:cover;}
        .card h3 {margin:10px 0 5px; font-size:18px;}
        .card p {margin:0 0 10px; color:#555;}
        .card a {display:inline-block; margin-bottom:10px; padding:8px 15px; background:#111; color:#fff; text-decoration:none; border-radius:5px;}
        .card a:hover {background:#ff5500;}
        footer {background:#111; color:#fff; text-align:center; padding:15px; margin-top:40px;}
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/categories/">Categories</a>
    <a href="/news/">News</a>
    <a href="/users/">Users</a>
    <a href="/orders/">Orders</a>
</nav>

<h1>{{ category.name }}</h1>
<p class="description">{{ category.description }}</p>

<div class="grid">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image.url }}" alt="{{ product.name }}">
        <h3>{{ product.name }}</h3>
        <p>${{ product.price }}</p>
        <a href="/products/{{ product.id }}/">View Details</a>
    </div>
    {% endfor %}
</div>

<footer>
    &copy; 2026 nike project
</footer>

</body>
</html>

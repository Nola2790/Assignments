<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nike - News</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        nav {background:#111; padding:15px;}
        nav a {color:#fff; margin:0 15px; text-decoration:none; font-weight:bold;}
        nav a:hover {color:#ff5500;}
        h1 {text-align:center; margin:30px 0; color:#111;}
        .grid {display:flex; flex-wrap:wrap; gap:20px; justify-content:center; padding:0 20px 40px;}
        .card {background:#fff; border-radius:8px; width:240px; box-shadow:0 2px 8px rgba(0,0,0,0.2); text-align:center; transition:transform 0.3s; overflow:hidden;}
        .card:hover {transform:translateY(-5px);}
        .card img {width:100%; height:150px; object-fit:cover;}
        .card h3 {margin:10px 0 5px; font-size:18px;}
        .card p {margin:0 10px 10px; color:#555; font-size:14px;}
        .card a {display:inline-block; margin-bottom:10px; padding:8px 15px; background:#111; color:#fff; text-decoration:none; border-radius:5px;}
        .card a:hover {background:#ff5500;}
        footer {background:#111; color:#fff; text-align:center; padding:15px; margin-top:40px;}
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/products/">Products</a>
    <a href="/categories/">Categories</a>
    <a href="/news/">News</a>
    <a href="/users/">Users</a>
    <a href="/orders/">Orders</a>
    <a href="{% url 'news_create' %}">Add News</a>
    <a href="{% url 'news_list' %}">Back to News List</a>
</nav>

<h2>News List</h2>
<table>
    <tr>
        <th>Title</th>
        <th>Actions</th>
    </tr>
    {% for news_item in news_items %}
    <tr>
        <td>{{ news_item.title }}</td>
        <td>
            <a href="{% url 'news_detail' news_item.id %}">View</a> |
            <a href="{% url 'news_update' news_item.id %}">Edit</a> |
            <a href="{% url 'news_delete' news_item.id %}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

</body>
</html>

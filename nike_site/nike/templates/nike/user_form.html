<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if user %}Edit User{% else %}Create User{% endif %} - Nike</title>
</head>
<body>

<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'user_list' %}">Back to User List</a>
</nav>

<h2>{% if user %}Edit User{% else %}Create User{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    <label for="username">Username:</label>
    <input type="text" name="username" value="{{ user.username|default:'' }}" required>
    
    <label for="email">Email:</label>
    <input type="email" name="email" value="{{ user.email|default:'' }}" required>
    
    <label for="password">Password:</label>
    <input type="password" name="password" {% if user %}placeholder="Leave empty to keep same"{% endif %}>

    <button type="submit">{% if user %}Update{% else %}Create{% endif %}</button>
</form>

</body>
</html>

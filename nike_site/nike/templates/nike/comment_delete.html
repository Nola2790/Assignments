<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Confirm Comment Deletion - Nike</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; background:#f5f5f5;}
        .container {max-width:600px; margin:100px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        h2 {text-align:center; margin-bottom:20px;}
        p {font-size:16px; margin:10px 0;}
        button {background:#111; color:#fff; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;}
        button:hover {background:#ff5500;}
        a {margin-top:20px; display:inline-block;}
    </style>
</head>
<body>

<div class="container">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete this comment?</p>
    <p><strong>{{ comment.user.username }}:</strong> {{ comment.content }}</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete Comment</button>
    </form>
    <a href="{% url 'news_detail' comment.news.id %}">Cancel</a>
</div>

</body>
</html>

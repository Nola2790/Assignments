<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback List</title>
<style>
body { font-family: Arial; background:#f8f9fa; margin:0; padding:0; }
header { background:#e74c3c; color:white; padding:20px; text-align:center; }
nav a { color:white; margin:0 10px; text-decoration:none; }
nav a:hover { text-decoration:underline; }
.container { max-width:700px; margin:40px auto; padding:20px; }
ul { list-style:none; padding:0; }
li { background:white; margin:10px 0; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
li a { margin-left:10px; color:#e74c3c; text-decoration:none; }
li a:hover { text-decoration:underline; }
</style>
</head>
<body>
<header>
<h1>Blood Donation Portal</h1>
<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'feedback_list' %}">Feedback</a>
</nav>
</header>

<div class="container">
<h2>Feedback List</h2>
<ul>
    {% for feedback in page_obj %}
        <li>
            <strong>{{ feedback.donor.first_name }} {{ feedback.donor.last_name }}</strong>: {{ feedback.message }} (Rating: {{ feedback.rating }})
            <a href="{% url 'feedback_update' feedback.id %}">Edit</a>
            <a href="{% url 'feedback_delete' feedback.id %}">Delete</a>
        </li>
    {% empty %}
        <li>No feedback found.</li>
    {% endfor %}
</ul>
</div>
</body>
</html>

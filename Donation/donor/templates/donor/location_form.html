<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if location %}Edit{% else %}Add{% endif %} Location</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f9;
        margin: 0;
        padding: 0;
    }

    header {
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        color: white;
        padding: 20px;
        text-align: center;
    }

    nav a {
        color: white;
        margin: 0 12px;
        text-decoration: none;
        font-weight: bold;
    }

    nav a:hover {
        text-decoration: underline;
    }

    .container {
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        color: #e74c3c;
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        margin-top: 10px;
        display: block;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 1em;
    }

    button {
        background: #e74c3c;
        color: white;
        border: none;
        cursor: pointer;
        padding: 10px;
        width: 100%;
        margin-top: 15px;
        border-radius: 5px;
        font-size: 1em;
    }

    button:hover {
        background: #c0392b;
    }

    a.cancel {
        display: inline-block;
        margin-top: 10px;
        text-decoration: none;
        color: #e74c3c;
    }

    a.cancel:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'location_list' %}">Locations</a>
    </nav>
</header>

<div class="container">
    <h2>{% if location %}Edit{% else %}Add{% endif %} Location</h2>
    <form method="POST">
        {% csrf_token %}
        
        <label for="name">Location Name</label>
        <input type="text" id="name" name="name" value="{{ location.name|default:'' }}" required>

        <label for="address">Address</label>
        <input type="text" id="address" name="address" value="{{ location.address|default:'' }}" required>

        <label for="contact_number">Contact Number</label>
        <input type="text" id="contact_number" name="contact_number" value="{{ location.contact_number|default:'' }}" required>

        <label for="branch">Branch</label>
        <select id="branch" name="branch" required>
            {% for branch in branches %}
                <option value="{{ branch.id }}" {% if location.branch.id == branch.id %}selected{% endif %}>
                    {{ branch.name }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">{% if location %}Update{% else %}Create{% endif %} Location</button>
    </form>
</div>

    <a href="{% url 'location_list' %}" class="cancel">Back to List</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if donation %}Edit Donation{% else %}Add Donation{% endif %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #e74c3c;
            color: white;
            text-align: center;
            padding: 20px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 1em;
        }
        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #c0392b;
        }
        a.cancel {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #e74c3c;
        }
        a.cancel:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'donation_list' %}">Donations</a>
    </nav>
</header>

<div class="container">
    <h2>{% if donation %}Edit Donation{% else %}Add Donation{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        <input type="date" name="donation_date" value="{{ donation.donation_date if donation }}" required>
        <input type="number" name="volume" value="{{ donation.volume if donation }}" placeholder="Volume (ml)" required>
        <button type="submit">{% if donation %}Update{% else %}Create{% endif %}</button>
    </form>
    <a href="{% url 'donation_list' %}" class="cancel">Cancel</a>
</div>
</body>
</html>

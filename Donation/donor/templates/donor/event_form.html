<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if event %}Edit{% else %}Add{% endif %} Event</title>
<style>
    body { font-family: Arial; background:#f8f9fa; margin:0; padding:0; }
    header { background:#e74c3c; color:white; padding:20px; text-align:center; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    nav a:hover { text-decoration:underline; }
    .container { max-width:500px; margin:40px auto; padding:20px; background:white; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    input, select, textarea, button { width:100%; padding:10px; margin:8px 0; border-radius:5px; border:1px solid #ccc; font-size:1em; }
    button { background:#e74c3c; color:white; border:none; cursor:pointer; }
    button:hover { background:#c0392b; }
    a.cancel { color:#e74c3c; text-decoration:none; display:inline-block; margin-top:10px; }
    a.cancel:hover { text-decoration:underline; }
</style>
</head>
<body>
<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'event_list' %}">Events</a>
    </nav>
</header>

<div class="container">
<h2>{% if event %}Edit{% else %}Add{% endif %} Event</h2>
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="text" name="name" value="{{ event.name|default:'' }}" placeholder="Event Name">
    <input type="date" name="date" value="{{ event.date|default:'' }}">
    <select name="location" required>
    {% for loc in locations %}
        <option value="{{ loc.id }}" {% if event and event.location.id == loc.id %}selected{% endif %}>{{ loc.name }}</option>
    {% endfor %}
    </select>
    <textarea name="description" placeholder="Description">{{ event.description|default:'' }}</textarea>
    <input type="file" name="event_image">
    <button type="submit">Submit</button>
</form>
<a href="{% url 'event_list' %}" class="cancel">Back to List</a>
</div>
</body>
</html>

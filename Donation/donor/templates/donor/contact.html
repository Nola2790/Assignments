<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
    body { font-family: Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 0; }
    header { background: #e74c3c; color: white; padding: 20px; text-align: center; }
    nav a { color: white; margin: 0 10px; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h2 { color: #e74c3c; text-align: center; margin-bottom: 20px; }
    label { font-weight: bold; margin-top: 10px; display: block; }
    input, textarea, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; font-size: 1em; }
    textarea { resize: vertical; min-height: 100px; }
    button { background: #e74c3c; color: white; border: none; cursor: pointer; margin-top: 15px; }
    button:hover { background: #c0392b; }
    a.cancel { color: #e74c3c; text-decoration: none; display: inline-block; margin-top: 10px; }
    a.cancel:hover { text-decoration: underline; }
</style>
</head>
<body>
<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'contact' %}">Contact</a>
        <a href="{% url 'about' %}">About</a>
    </nav>
</header>

<div class="container">
<h2>Contact Us</h2>
<form method="POST">
    {% csrf_token %}
    <label>Name</label>
    <input type="text" name="name" required>

    <label>Email</label>
    <input type="email" name="email" required>

    <label>Message</label>
    <textarea name="message" required></textarea>

    <button type="submit">Send Message</button>
</form>
<a href="{% url 'home' %}" class="cancel">Back to Home</a>
</div>
</body>
</html>

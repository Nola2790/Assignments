<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipient List</title>
<style>
body { font-family: Arial; background:#f8f9fa; margin:0; padding:0; }
header { background:#e74c3c; color:white; padding:20px; text-align:center; }
nav a { color:white; margin:0 10px; text-decoration:none; }
nav a:hover { text-decoration:underline; }
.container { max-width:700px; margin:40px auto; padding:20px; }
ul { list-style:none; padding:0; }
li { background:white; margin:10px 0; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
li a { margin-right:10px; color:#e74c3c; text-decoration:none; }
li a:hover { text-decoration:underline; }
.add-new { display:inline-block; margin-top:15px; padding:10px 15px; background:#e74c3c; color:white; border-radius:5px; text-decoration:none; }
.add-new:hover { background:#c0392b; }
</style>
</head>
<body>
<header>
<h1>Blood Donation Portal</h1>
<nav>
    <a href="{% url 'home' %}">Home</a>
    <a href="{% url 'recipient_list' %}">Recipients</a>
</nav>
</header>

<div class="container">
<h2>Recipient List</h2>
<ul>
    {% for recipient in page_obj %}
        <li>
            <a href="{% url 'recipient_detail' recipient.id %}">{{ recipient.first_name }} {{ recipient.last_name }}</a>
            <a href="{% url 'recipient_update' recipient.id %}">Edit</a>
            <a href="{% url 'recipient_delete' recipient.id %}">Delete</a>
        </li>
    {% empty %}
        <li>No recipients found.</li>
    {% endfor %}
</ul>
<a href="{% url 'recipient_create' %}" class="add-new">Add New Recipient</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Recipient</title>
</head>
<body>
    <h1>Delete Recipient</h1>
    <p>Are you sure you want to delete "{{ recipient.first_name }} {{ recipient.last_name }}"?</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'recipient_list' %}">Cancel</a>
    </form>
</body>
</html>

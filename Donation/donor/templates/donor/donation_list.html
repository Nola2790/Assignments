<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation List</title>
    <style>
        body { font-family: Arial; background:#f8f9fa; margin:0; padding:0; }
        header { background:#e74c3c; color:white; padding:20px; text-align:center; }
        nav a { color:white; margin:0 15px; text-decoration:none; }
        nav a:hover { text-decoration:underline; }
        .container { max-width:800px; margin:40px auto; padding:20px; }
        ul { list-style:none; padding:0; }
        ul li { background:white; margin:10px 0; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
        ul li a { margin-right:10px; color:#e74c3c; text-decoration:none; }
        ul li a:hover { text-decoration:underline; }
        .add-new { display:inline-block; margin-top:15px; padding:10px 15px; background:#e74c3c; color:white; border-radius:5px; text-decoration:none; }
        .add-new:hover { background:#c0392b; }
    </style>
</head>
<body>
<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'donation_list' %}">Donations</a>
    </nav>
</header>

<div class="container">
    <h2>Donation List</h2>
    <ul>
        {% for donation in page_obj %}
            <li>
                <a href="{% url 'donation_detail' donation.id %}">Donation on {{ donation.donation_date }}</a>
                <a href="{% url 'donation_update' donation.id %}">Edit</a>
                <a href="{% url 'donation_delete' donation.id %}">Delete</a>
            </li>
        {% empty %}
            <li>No donations available.</li>
        {% endfor %}
    </ul>
    <a href="{% url 'donation_create' %}" class="add-new">Add New Donation</a>
</div>
</body>
</html>

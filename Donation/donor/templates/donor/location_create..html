<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if location %}Edit{% else %}Add{% endif %} Location</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

/* Header */
header {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    padding: 20px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 12px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

/* Container */
.container {
    max-width: 600px;
    margin: 50px auto;
    padding: 30px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    color: #e74c3c;
    margin-bottom: 25px;
}

/* Form Fields */
label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: #e74c3c;
    outline: none;
    box-shadow: 0 0 5px rgba(231,76,60,0.3);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 25px;
    border-radius: 6px;
    border: none;
    background: #e74c3c;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #c0392b;
}

/* Back link */
a.cancel {
    display: block;
    text-align: center;
    margin-top: 15px;
    color: #e74c3c;
    text-decoration: none;
    font-weight: bold;
}

a.cancel:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<header>
    <h1>Blood Donation Portal</h1>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'location_list' %}">Locations</a>
    </nav>
</header>

<div class="container">
    <h2>{% if location %}Edit{% else %}Add{% endif %} Location</h2>

    <form method="post">
        {% csrf_token %}

        <label>Location Name</label>
        <input type="text" name="name"
               value="{{ location.name|default:'' }}" required>

        <label>Address</label>
        <textarea name="address" rows="3" required>
{{ location.address|default:'' }}</textarea>

        <label>City</label>
        <input type="text" name="city"
               value="{{ location.city|default:'' }}" required>

        <label>Contact Number</label>
        <input type="text" name="contact_number"
               value="{{ location.contact_number|default:'' }}">

        <button type="submit">
            {% if location %}Update Location{% else %}Create Location{% endif %}
        </button>
    </form>

    <a href="{% url 'location_list' %}" class="cancel">
        ← Back to Location List
    </a>
</div>

</body>
</html>

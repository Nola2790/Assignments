<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipient Detail</title>
</head>
<body>
    <h1>{{ recipient.first_name }} {{ recipient.last_name }}</h1>
    <p><strong>Blood Type:</strong> {{ recipient.blood_type }}</p>
    <p><strong>Phone:</strong> {{ recipient.phone_number }}</p>
    <p><strong>Email:</strong> {{ recipient.email }}</p>

    <a href="{% url 'recipient_update' recipient.id %}">Edit</a> |
    <a href="{% url 'recipient_delete' recipient.id %}">Delete</a> |
    <a href="{% url 'recipient_list' %}">Back to List</a>
</body>
</html>
